# Пример проектного конфига (.goagent.yaml в корне проекта)
#
# Скопируйте в корень вашего Go-проекта и адаптируйте под свои нужды.

ollama:
  # URL Ollama API
  base_url: "http://localhost:11434"
  # Модель для генерации (см. ollama list)
  model: "qwen3-coder:30b"
  # Таймаут на один запрос к API
  timeout: 300s
  # Размер контекстного окна модели (в токенах)
  context_size: 32768

agent:
  # Максимальное количество итераций цикла (защита от бесконечного цикла)
  max_iterations: 50
  # Автоматически исправлять ошибки build/test/lint через LLM
  auto_fix: true
  # Автоматически коммитить изменения (требует осторожности)
  auto_commit: false

tools:
  # Директории, в которых разрешены файловые операции
  allowed_dirs:
    - "."
  # Паттерны файлов, к которым запрещён доступ
  forbidden_patterns:
    - "*.env"
    - ".git/**"
    - "*.pem"
    - "*.key"
    - "credentials.*"
    - "secrets.*"

rules:
  # Директории с правилами, документацией и командами
  dirs:
    - ".goagent/rules"
    - ".goagent/docs"
    - ".goagent/commands"
