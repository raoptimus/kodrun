# Project config example (.kodrun.yaml in the project root)
#
# Copy to the root of your Go project and adapt to your needs.
#
# Three things you most likely want to tune live in the first ~60 lines:
#   1. providers:        — base URL, model and TEMPERATURE per provider profile
#   2. agent.*_provider  — which provider serves which sub-agent role
#   3. agent.max_*       — concurrency: tool-call workers vs DAG step parallelism

# ----------------------------------------------------------------------------
# 1. PROVIDERS — one entry per (URL, model, generation profile) combination.
#
# Temperature is set HERE, not under agent. To get a different temperature for
# a sub-agent role, define another provider profile and reference it from the
# `agent` section below. All three example profiles point to the same local
# Ollama; only their generation parameters differ, so the file works
# out-of-the-box without any extra setup.
# ----------------------------------------------------------------------------
providers:
  default:
    base_url: "http://localhost:11434"
    model: "qwen3-coder:30b"
    timeout: 5m
    context_size: 32768
    temperature: 0.7        # default chat / executor temperature

  thinking:
    base_url: "http://localhost:11434"
    model: "qwen3-coder:30b"
    timeout: 5m
    context_size: 32768
    temperature: 0.6        # planner + reviewer: free-form reasoning

  precise:
    base_url: "http://localhost:11434"
    model: "qwen3-coder:30b"
    timeout: 5m
    context_size: 32768
    temperature: 0.2        # executor: deterministic edits

  # Optional: dedicated remote GPU server for heavy models.
  # gpu-server:
  #   base_url: "http://gpu-server:11434"
  #   model: "qwen3-coder:30b"
  #   timeout: 10m
  #   context_size: 65536
  #   temperature: 0.5

  # Embedding provider for RAG. The model lives HERE — there is no separate
  # `rag.embedding_model` field. To switch embedding model, change `model`
  # below (and `ollama pull` it).
  embed:
    base_url: "http://localhost:11434"
    model: "nomic-embed-text"
    timeout: 2m
    context_size: 8192

# Legacy fallback. Used only when `providers:` is empty. Prefer `providers:`.
# ollama:
#   base_url: "http://localhost:11434"
#   model: "qwen3-coder:30b"
#   timeout: 5m
#   context_size: 32768

agent:
  # --------------------------------------------------------------------------
  # 2. ROLES & SUB-AGENTS — wire each role to a provider profile from above.
  #
  # Role mapping inside the orchestrator:
  #   planner             → thinking_provider   (analyses code, writes markdown plan)
  #   reviewer            → thinking_provider   (final pass over executor changes)
  #   extractor           → extractor_provider  (markdown plan → human-readable)
  #   structurer          → extractor_provider  (markdown → JSON Plan{Steps[]})
  #   executor            → executor_provider   (applies the plan, whitelist-locked)
  #   step_executor       → executor_provider   (one DAG step in isolation)
  #   response_classifier → provider            (TUI response classification)
  #
  # Empty *_provider falls back to `provider`. The extractor/structurer roles
  # ALWAYS run with format=json + temperature=0 overlaid automatically — you
  # do NOT need a dedicated profile to get deterministic JSON.
  # --------------------------------------------------------------------------
  provider: default              # chat + default fallback for unset roles
  thinking_provider: thinking    # planner + reviewer
  executor_provider: default     # executor + step_executor — set to `precise` (T=0.2) if your local model answers EDIT tasks with markdown plans instead of tool calls
  extractor_provider: default    # extractor + structurer (json/temp=0 forced)

  # --------------------------------------------------------------------------
  # 3. CONCURRENCY — two independent levels of parallelism.
  #
  #   max_tool_workers   — parallel read-only TOOL CALLS inside ONE sub-agent.
  #                        Each chat turn may produce many tool calls; this
  #                        caps how many run concurrently. Default 4.
  #
  #   max_parallel_tasks — parallel STEPS of an approved plan, run as a DAG of
  #                        independent sub-agents with per-file locking.
  #                        Default 1 (sequential). Set to 2+ to enable true
  #                        plan parallelism. Each parallel sub-agent gets a
  #                        fresh history, its own read-path whitelist and its
  #                        own per-step RAG bundle.
  #
  #   max_replans        — hard cap on REPLAN cycles within one Run. The
  #                        executor emits REPLAN when the approved plan lacks
  #                        context. Default 2.
  # --------------------------------------------------------------------------
  max_tool_workers: 4
  max_parallel_tasks: 1
  max_replans: 2

  # --------------------------------------------------------------------------
  # Code review tuning
  # --------------------------------------------------------------------------
  # Wall-time cap for a single review specialist (default 5m).
  # Prevents a slow specialist from blocking the entire review.
  specialist_timeout: 5m

  # --------------------------------------------------------------------------
  # Behaviour
  # --------------------------------------------------------------------------
  # Max iterations of the agent loop (infinite-loop protection).
  max_iterations: 50
  # Default mode at startup: "plan" (read-only) or "edit" (full tools).
  default_mode: "plan"
  # Stream "thinking" reasoning blocks from models that support it.
  think: true
  # Pre-read all .go files into the executor prompt (skips read_file iterations).
  prefetch_code: true
  # Override automatic project-language detection. Empty = auto. Values: go|python|jsts.
  project_language: ""
  # Automatically fix build/test/lint errors via LLM.
  auto_fix: true
  # Automatically commit changes (use with caution).
  auto_commit: false
  # Assistant response language (en, ru, de, fr, es, zh, ja).
  language: "en"
  # Auto-compact context when ≥99% full.
  auto_compact: true
  # Use the Plan→Execute→Review pipeline by default.
  orchestrator: false
  # Enable the Review phase after Execute (only effective when orchestrator: true).
  review: false

tools:
  # Directories where file operations are allowed
  allowed_dirs:
    - "."
  # File patterns that are blocked from access
  forbidden_patterns:
    - "*.env"
    - ".git/**"
    - "*.pem"
    - "*.key"
    - "credentials.*"
    - "secrets.*"

rules:
  # Fixed directories: .kodrun/rules, .kodrun/commands, .kodrun/docs
  # Register get_rule as a tool for LLM (true by default)
  # When false, rules are only available via catalog in system prompt
  use_tool: true

snippets:
  # Fixed directory: .kodrun/snippets
  # Register snippets as a tool for LLM (true by default)
  use_tool: true

rag:
  # Provider name for embedding (from providers section above). The provider's
  # `model` field IS the embedding model — there is no separate setting here.
  provider: embed
  # Enable RAG (semantic search over project conventions).
  #
  # Scope: RAG indexes ONLY project conventions — files under .kodrun/rules/,
  # .kodrun/snippets/, .kodrun/docs/, plus embedded language standards (e.g.
  # Effective Go). Project source code is intentionally NOT indexed: chunked
  # code snapshots go stale between reindexes and lead reviewers to cite code
  # that no longer exists. Source files are read live via the `read_file`
  # tool, which is always authoritative.
  enabled: false
  # Deprecated: no longer used. Kept for backward compatibility — kodrun no
  # longer indexes project source code. Remove these fields from your config.
  # index_dirs:
  #   - "."
  # exclude_dirs:
  #   - ".git"
  # max_chunks_per_file: 8
  # Chunk size (in lines) — applies to rules/snippets/docs chunking.
  chunk_size: 128
  # Overlap between chunks (in lines). Lower values reduce index duplication.
  chunk_overlap: 16
  # Number of search results
  top_k: 5
  # Hard cap on the RAG prefetch block injected into /code-review prompts.
  # 0 falls back to the built-in default (24 KB).
  review_budget_bytes: 24576
  # Index storage path
  index_path: ".kodrun/rag_index"

# MCP servers (Model Context Protocol)
# Each server is a subprocess, communicating via stdio (JSON-RPC 2.0)
